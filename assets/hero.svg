<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5A0"/>
      <stop offset="55%" stop-color="#00D9F5"/>
      <stop offset="100%" stop-color="#9D7BFF"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05080d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#00F5A0" stroke-width="0.6" stroke-opacity="0.10"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1000" height="280" rx="14" fill="url(#fade)"/>
  <rect width="1000" height="280" rx="14" fill="url(#grid)"/>
  <rect x="1" y="1" width="998" height="278" rx="13" fill="none" stroke="url(#neon)" stroke-width="1.4" stroke-opacity="0.55"/>

  <!-- moving scanline -->
  <rect x="0" width="1000" height="40" fill="#00F5A0" opacity="0.05">
    <animate attributeName="y" values="-40;280" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <!-- corner ticks -->
  <g stroke="#00D9F5" stroke-width="2" opacity="0.8">
    <path d="M22 22h26M22 22v26"/><path d="M978 22h-26M978 22v26"/>
    <path d="M22 258h26M22 258v-26"/><path d="M978 258h-26M978 258v-26"/>
  </g>

  <!-- kicker (smallest tier) -->
  <text x="60" y="78" fill="#00D9F5" font-size="15" letter-spacing="10" font-weight="700">
    ▍ SUBJECT&#160;A-69 &#160;//&#160; LIVE
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.2s" repeatCount="indefinite"/>
  </text>

  <!-- TITLE (largest tier) -->
  <text x="58" y="172" font-size="92" font-weight="900" letter-spacing="2"
        fill="url(#neon)" filter="url(#glow)" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif">
    LALIT SINGH
  </text>
  <!-- title underline sweep -->
  <rect x="60" y="190" height="4" rx="2" fill="url(#neon)">
    <animate attributeName="width" values="0;560;560" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle (middle tier) -->
  <text x="62" y="232" fill="#9aa6b2" font-size="20" letter-spacing="5" font-weight="700">
    FULL-STACK ENGINEER
    <tspan fill="#00F5A0"> · </tspan>REAL-TIME SYSTEMS
    <tspan fill="#00F5A0"> · </tspan>GO<tspan fill="#00D9F5">+</tspan>TS
  </text>
  <!-- blinking cursor -->
  <rect x="690" y="216" width="13" height="22" fill="#00F5A0">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- right-side arcade HUD -->
  <g font-size="13" fill="#5b6772" letter-spacing="2" text-anchor="end">
    <text x="940" y="120">HP &#9608;&#9608;&#9608;&#9608;&#9608;</text>
    <text x="940" y="142" fill="#00D9F5">LVL&#160;&#160;CS&#160;UNDERGRAD</text>
    <text x="940" y="164">XP&#160;&#160;200+&#160;USERS&#160;SHIPPED</text>
  </g>
</svg>
