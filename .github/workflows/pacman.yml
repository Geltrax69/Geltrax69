name: generate game graphs
on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:
  push: { branches: [main] }
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      # Pac-Man eating the contribution graph
      - uses: abozanona/pacman-contribution-graph@master
        with:
          github_user_name: Geltrax69
          outputs: dist/pacman-contribution-graph.svg
      # Snake too (fallback / extra)
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Geltrax69
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00F5A0
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
